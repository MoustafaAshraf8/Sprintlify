on:
  push:
    branches:
      - dev

jobs:
  Worker-Deploy:
    name: Worker-Deploy
    defaults:
      run:
        working-directory: ./sprintlify
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: npm ci

      - name: Set Worker Secrets
        run: |
          echo "${{ secrets.DEV_SUPABASE_URL }}" | npx wrangler secret put SUPABASE_URL --env dev
          echo "${{ secrets.DEV_SUPABASE_ANON_KEY }}" | npx wrangler secret put SUPABASE_ANON_KEY --env dev
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Build & Deploy Worker
        run: npx wrangler deploy --env dev
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
